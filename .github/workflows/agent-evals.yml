name: Nightly Agent Evals

# Runs the chat-agent eval suite once a day. The suite makes real OpenAI
# calls (~$0.30 a run, ~30s) so it stays gated behind RUN_EVALS=1 and
# does NOT run on every PR. Failures here mean tool-pick regressions —
# the model started picking a different tool for a canonical realtor
# utterance. Investigate the prompt diff before merging that day's PRs.
#
# This workflow is allowed to fail without blocking PRs. The point is
# the SIGNAL — a Slack/email follow-up when the suite goes red — not
# enforcement. Treat it like a smoke alarm, not a gate.

on:
  schedule:
    # 02:30 UTC daily. After most US contributors are done pushing for
    # the day so a flaky nightly doesn't burn the next morning.
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Manual trigger for ad-hoc runs (e.g. after a prompt change).
    inputs:
      ref:
        description: 'Branch or SHA to eval'
        required: false
        default: 'main'

concurrency:
  group: agent-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip the run if OPENAI_API_KEY isn't configured on the repo — better
    # to no-op than fail with a misleading "auth error" message.
    if: ${{ vars.AGENT_EVALS_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run agent evals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RUN_EVALS: '1'
        run: pnpm eval

      - name: Upload eval log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-log
          path: eval-output.log
          if-no-files-found: ignore
          retention-days: 14
