name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Fail on stray package-lock.json
        run: |
          if [ -f package-lock.json ]; then
            echo "::error::package-lock.json is committed. This repo uses pnpm only — delete it."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # Lockfile is regenerated when devDependencies change. Once the lockfile
      # is regenerated and committed, swap this for `--frozen-lockfile`.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Contract tests
        run: pnpm test:contract
